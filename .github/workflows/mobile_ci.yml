name: Mobile CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Pub get
        run: flutter pub get

      - name: Test
        run: flutter test

  android_build:
    name: Android Flavor Build
    runs-on: ubuntu-latest
    needs: [analyze, unit_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Ensure gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Pub get
        run: flutter pub get

      - name: Build dev apk
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart

      - name: Build stg apk
        run: flutter build apk --debug --flavor stg -t lib/main_stg.dart

      - name: Build prod apk
        run: flutter build apk --debug --flavor prod -t lib/main_prod.dart

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-flavors
          path: build/app/outputs/flutter-apk/*.apk

  android_integration:
    name: Android Emulator Integration
    runs-on: ubuntu-latest
    needs: [android_build]
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Ensure gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Pub get
        run: flutter pub get

      - name: Run integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            flutter test integration_test/smoke_startup_test.dart -d emulator-5554

  ios_compile:
    name: iOS Compile (No Codesign)
    runs-on: macos-latest
    needs: [analyze, unit_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Pub get
        run: flutter pub get

      - name: Prepare iOS Firebase placeholder
        run: |
          cat <<'EOF' > ios/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>CI_PLACEHOLDER</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.neredeservis.app</string>
            <key>PROJECT_ID</key><string>ci-placeholder</string>
            <key>STORAGE_BUCKET</key><string>ci-placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          EOF

      # iOS multi-scheme henuz tanimli degil; bu adim prod entrypoint icin compile guard olarak calisir.
      - name: Build iOS no-codesign
        id: ios_build
        continue-on-error: true
        run: flutter build ios --no-codesign -t lib/main_prod.dart

      - name: Report iOS guard status
        if: always()
        run: |
          if [ "${{ steps.ios_build.outcome }}" != "success" ]; then
            echo "::warning::iOS no-codesign compile failed (non-blocking in no-Mac mode)."
          else
            echo "iOS no-codesign compile passed."
          fi
