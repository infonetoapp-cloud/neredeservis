name: Functions CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  functions-lint-build-rules:
    name: functions-lint-build-rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect functions/rules changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions_scope:
              - 'functions/**'
              - 'firebase.json'
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'database.rules.json'
              - '.github/workflows/functions-ci.yml'

      - name: Skip (docs-only or out-of-scope changes)
        if: github.event_name != 'workflow_dispatch' && steps.filter.outputs.functions_scope != 'true'
        run: echo "No functions/rules changes detected. Skipping lint/build/tests."
        working-directory: .

      - name: Setup Java 17 (Rules emulators)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        run: npm ci

      - name: Lint
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        run: npm run lint

      - name: Build
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        run: npm run build

      - name: Rules tests (with emulators)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.functions_scope == 'true'
        run: npx firebase emulators:exec --only firestore,database "npm run test:rules:unit"
