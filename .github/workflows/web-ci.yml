name: Web CI

on:
  pull_request:
    paths:
      - "website/apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "website/apps/web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

jobs:
  web-lint-build:
    name: web-lint-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: website/apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
