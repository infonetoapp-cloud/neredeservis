name: Web CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  web-lint-build:
    name: web-lint-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect web changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'website/apps/web/**'

      - name: Skip (docs-only or non-web changes)
        if: github.event_name != 'workflow_dispatch' && steps.filter.outputs.web != 'true'
        run: echo "No web changes detected. Skipping lint/build."
        working-directory: .

      - name: Setup pnpm
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: website/apps/web/pnpm-lock.yaml

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true'
        run: pnpm lint

      - name: Build
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true'
        run: pnpm build
