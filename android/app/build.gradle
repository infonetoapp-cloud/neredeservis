plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def decodedDartDefines = [:]
if (project.hasProperty("dart-defines")) {
    decodedDartDefines = project.property("dart-defines")
            .split(",")
            .collectEntries { encoded ->
                def decoded = new String(encoded.decodeBase64(), "UTF-8")
                def separatorIndex = decoded.indexOf("=")
                if (separatorIndex == -1) {
                    return [:]
                }
                [(decoded.substring(0, separatorIndex)): decoded.substring(separatorIndex + 1)]
            }
}

def googleMapsApiKeyFromDartDefine = (decodedDartDefines["GOOGLE_MAPS_API_KEY"] ?: "").toString().trim()
def resolveGoogleMapsApiKey = { flavorSuffix ->
    def byFlavor = (project.findProperty("GOOGLE_MAPS_API_KEY_${flavorSuffix}") ?: "")
            .toString()
            .trim()
    return byFlavor.isEmpty() ? googleMapsApiKeyFromDartDefine : byFlavor
}

android {
    namespace = "com.neredeservis.app"
    compileSdkVersion 35
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.neredeservis.app"
        minSdkVersion = Math.max(flutter.minSdkVersion, 23)
        targetSdkVersion 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    flavorDimensions += "environment"
    productFlavors {
        dev {
            dimension = "environment"
            applicationId = "com.neredeservis.app.dev"
            resValue "string", "app_name", "NeredeServis Dev"
            manifestPlaceholders = [
                    GOOGLE_MAPS_API_KEY: resolveGoogleMapsApiKey("DEV")
            ]
        }
        stg {
            dimension = "environment"
            applicationId = "com.neredeservis.app.stg"
            resValue "string", "app_name", "NeredeServis Stg"
            manifestPlaceholders = [
                    GOOGLE_MAPS_API_KEY: resolveGoogleMapsApiKey("STG")
            ]
        }
        prod {
            dimension = "environment"
            applicationId = "com.neredeservis.app"
            resValue "string", "app_name", "NeredeServis"
            manifestPlaceholders = [
                    GOOGLE_MAPS_API_KEY: resolveGoogleMapsApiKey("PROD")
            ]
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

def hasGoogleServicesConfig =
        file("google-services.json").exists() ||
        file("src/dev/google-services.json").exists() ||
        file("src/stg/google-services.json").exists() ||
        file("src/prod/google-services.json").exists()

if (hasGoogleServicesConfig) {
    apply plugin: "com.google.gms.google-services"
}
